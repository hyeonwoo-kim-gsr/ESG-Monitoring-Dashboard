name: ESG 동향 리포트 수집 및 대시보드 갱신

on:
  schedule:
    # 매일 오전 8시(KST) = UTC 23:00 (전날) 실행
    - cron: "0 23 * * *"
  workflow_dispatch: {}   # 수동 실행 버튼 (테스트용)

permissions:
  contents: write   # docs/data 변경분을 저장소에 커밋하기 위해 필요

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 의존성 설치
        run: pip install requests

      - name: 수집 스크립트 실행
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DASHBOARD_DATA_DIR: docs/data
        run: python scripts/esg_collector.py

      - name: docs/data 변경분 커밋 & 푸시
        run: |
          git config user.name "esg-dashboard-bot"
          git config user.email "esg-dashboard-bot@users.noreply.github.com"
          git add docs/data
          git diff --cached --quiet && echo "변경 사항 없음" || git commit -m "chore: 대시보드 데이터 갱신 ($(date -u +%Y-%m-%d))"
          git push
